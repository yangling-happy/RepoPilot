server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: business
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${REPOPILOT_DB_URL:jdbc:mysql://127.0.0.1:3306/repopilot?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${REPOPILOT_DB_USERNAME:root}
    password: ${REPOPILOT_DB_PASSWORD:root}
  session:
    store-type: none

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.repopilot.business.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# GitLab Configuration
gitlab:
  group: your-gitlab-group
  api-url: ${GITLAB_API_URL:http://localhost:8082/api/v4}
  oauth:
    client-id: ${GITLAB_OAUTH_CLIENT_ID:328b45fa5e206cdc8d2b674164d5affbfeb5df2231f7bb04b669d315a50b63db}
    client-secret: ${GITLAB_OAUTH_CLIENT_SECRET:gloas-d9ef97abd7ef435c9fadbd74e958c61aefe02c663b863d4b6ea909ab165d603e}
    redirect-uri: ${GITLAB_OAUTH_REDIRECT_URI:http://localhost:8080/api/oauth/callback}
    authorize-url: ${GITLAB_OAUTH_AUTHORIZE_URL:http://localhost:8082/oauth/authorize}
    token-url: ${GITLAB_OAUTH_TOKEN_URL:http://localhost:8082/oauth/token}
    scopes: read_user api

# Deployment Configuration
deploy:
  timeout-minutes: 10
  script-path: /path/to/scripts

repo:
  clone:
    default-branch: main
    timeout-seconds: 120

frontend:
  base-url: ${FRONTEND_BASE_URL:http://localhost:3000}

user:
  workspace:
    base-dir: ${USER_WORKSPACE_BASE:.}

terminal:
  relay:
    base-url: ${TERMINAL_RELAY_BASE_URL:http://localhost:8081/internal/terminal/sessions}
  tasks:
    base-url: ${TERMINAL_TASKS_BASE_URL:http://localhost:8081/api/terminal/tasks}
    run-url: ${TERMINAL_TASK_RUN_URL:http://localhost:8081/internal/terminal/tasks/run}
