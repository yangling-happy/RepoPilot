server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: business
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:repopilot}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
  session:
    store-type: none

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.repopilot.business.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# GitLab Configuration
gitlab:
  group: your-gitlab-group
  api-url: https://gitlab.com/api/v4

# Deployment Configuration
deploy:
  timeout-minutes: 10
  script-path: /path/to/scripts
