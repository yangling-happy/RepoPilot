server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: business
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${REPOPILOT_DB_URL:jdbc:mysql://127.0.0.1:3306/repopilot?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${REPOPILOT_DB_USERNAME:root}
    password: ${REPOPILOT_DB_PASSWORD:}
  session:
    store-type: none

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.repopilot.business.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# GitLab Configuration
gitlab:
  group: your-gitlab-group
  api-url: https://gitlab.com/api/v4

# Deployment Configuration
deploy:
  timeout-minutes: 10
  script-path: /path/to/scripts

repo:
  clone:
    root-dir: ${REPO_CLONE_ROOT:./workspace/repos}
    default-branch: main
    timeout-seconds: 120

doc:
  output:
    root-dir: ${DOC_OUTPUT_ROOT:./workspace/docs}

terminal:
  relay:
    base-url: ${TERMINAL_RELAY_BASE_URL:http://localhost:8081/internal/terminal/sessions}
