server:
  port: 8081

spring:
  application:
    name: terminal
  websocket:
    max-text-message-size: 65536
    max-binary-message-size: 65536

terminal:
  tasks:
    shell: ${TERMINAL_TASK_SHELL:bash}
    script-dir: ${TERMINAL_TASK_SCRIPT_DIR:}
    default-timeout-seconds: ${TERMINAL_TASK_DEFAULT_TIMEOUT_SECONDS:600}
